# render.yaml — DotSync Render deployment config
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: dotsync-server
    runtime: go
    plan: starter          # change to standard/pro for production
    region: oregon         # options: oregon, frankfurt, singapore, ohio
    branch: main

    buildCommand: "go mod tidy && go build -ldflags='-s -w' -o dotsync-server ./cmd/dotsync"
    startCommand: "./dotsync-server"

    healthCheckPath: /health

    autoDeploy: true

    envVars:
      - key: PORT
        value: "10000"          # Render assigns this automatically; keep in sync

      - key: FRONTEND_URL
        sync: false             # set in Render dashboard

      - key: MIGRATIONS_PATH
        value: ./migrations

      - key: DATABASE_URL
        sync: false             # paste your Neon pooled connection string in the Render dashboard
                                 # format: postgresql://user:pass@ep-xxx-pooler.region.aws.neon.tech/dbname?sslmode=require

      - key: DATABASE_URL_DIRECT
        sync: false             # Neon's DIRECT (unpooled) connection string — use for migrations
                                 # format: postgresql://user:pass@ep-xxx.region.aws.neon.tech/dbname?sslmode=require

      - key: JWT_SECRET
        generateValue: true     # Render generates a secure random value

      - key: GITHUB_CLIENT_ID
        sync: false             # set in Render dashboard
                                 # GITHUB_CLIENT_SECRET is NOT needed here — login uses
                                 # GitHub's Device Flow; the server never participates in
                                 # the token exchange and never needs the secret.

      - key: STRIPE_SECRET_KEY
        sync: false             # set in Render dashboard

      - key: STRIPE_WEBHOOK_SECRET
        sync: false             # set in Render dashboard

# Database is hosted on Neon (https://neon.tech), not Render —
# create a project there and paste both connection strings above.
# No `databases:` block needed since Neon manages it independently.
