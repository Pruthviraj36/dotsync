# render.yaml — DotSync Render deployment config
# https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: dotsync-server
    runtime: go
    plan: starter          # change to standard/pro for production
    region: oregon         # options: oregon, frankfurt, singapore, ohio
    branch: main

    buildCommand: "go build -ldflags='-s -w' -o dotsync-server ./cmd/dotsync"
    startCommand: "./dotsync-server"

    healthCheckPath: /health

    autoDeploy: true

    envVars:
      - key: PORT
        value: "10000"          # Render assigns this automatically; keep in sync

      - key: FRONTEND_URL
        sync: false             # set in Render dashboard

      - key: MIGRATIONS_PATH
        value: ./migrations

      - key: DATABASE_URL
        fromDatabase:
          name: dotsync-db
          property: connectionString

      - key: JWT_SECRET
        generateValue: true     # Render generates a secure random value

      - key: GITHUB_CLIENT_ID
        sync: false             # set in Render dashboard

      - key: GITHUB_CLIENT_SECRET
        sync: false             # set in Render dashboard

      - key: STRIPE_SECRET_KEY
        sync: false             # set in Render dashboard

      - key: STRIPE_WEBHOOK_SECRET
        sync: false             # set in Render dashboard

databases:
  - name: dotsync-db
    databaseName: dotsync
    plan: starter              # change to standard for production
    region: oregon
